spring:
  application:
    name: BookVerse
  datasource:
    username: postgres
    password: 1234
    url: jdbc:postgresql://localhost:5432/BookVerse
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


server:
  port: 8080


logging:
  level:
    root: INFO
    com.example.BookVerse: DEBUG

